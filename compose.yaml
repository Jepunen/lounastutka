services:
  traefik:
    image: traefik:v2.11
    command:
      - --providers.docker=true
      - --providers.docker.swarmMode=true
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - edge
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  app:
    image: lounastutka-backend:latest
    expose:
      - "3001"
    networks:
      - edge
      - backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
      labels:
        - traefik.enable=true
        - traefik.http.routers.api.rule=PathPrefix(`/api`)
        - traefik.http.routers.api.entrypoints=web
        - traefik.http.services.api.loadbalancer.server.port=3001

  frontend:
    image: lounastutka-frontend:latest
    networks:
      - edge
    deploy:
      replicas: 1
      labels:
        - traefik.enable=true
        - traefik.http.routers.frontend.rule=PathPrefix(`/`)
        - traefik.http.routers.frontend.entrypoints=web
        - traefik.http.services.frontend.loadbalancer.server.port=80

  # ---------------------------------------------
  # Database (PostgreSQL)
  # ---------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lounastutka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lounastutka}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------
  # Monitoring: Prometheus
  # ---------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - monitoring
      - backend # Needed to scrape the app
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------
  # Logging: Loki
  # ---------------------------------------------
  loki:
    image: grafana/loki:latest
    ports:
      - target: 3100
        published: 3100
        protocol: tcp
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------
  # Visualization: Grafana
  # ---------------------------------------------
  grafana:
    image: grafana/grafana:latest
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

# ---------------------------------------------
# Named Volumes
# ---------------------------------------------
volumes:
  pg_data:
  prom_data:
  grafana_data:

# ---------------------------------------------
# Overlay Networks (Required for Swarm)
# ---------------------------------------------
networks:
  edge:
    driver: overlay
  backend:
    driver: overlay
  monitoring:
    driver: overlay
