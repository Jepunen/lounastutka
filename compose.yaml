services:
  traefik:
    image: traefik:v3.6
    environment:
      - HETZNER_API_TOKEN=${HETZNER_API_TOKEN}

    networks:
      - traefik_proxy

    ports:
        # Expose Traefik's entry points to the Swarm
        # Swarm requires the long syntax for ports.
      - target: 80 # Container port (Traefik web entry point)
        published: 80 # Host port exposed on the nodes
        protocol: tcp
        # 'host' mode binds directly to the node's IP where the task runs.
        # 'ingress' mode uses Swarm's Routing Mesh (load balances across nodes).
        # Choose based on your load balancing strategy. 'host' is often simpler if using an external LB.
        mode: host
      - target: 443 # Container port ( Traefik websecure entry point)
        published: 443 # Host port
        protocol: tcp
        mode: host
    
    volumes:
      # Mount the Docker socket for the Swarm provider
      # This MUST be run from a manager node to access the Swarm API via the socket.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
      - ./dynamic:/dynamic:ro
    
    # Traefik Static configuration via command-line arguments
    command:
      # HTTP EntryPoint
      - "--entrypoints.web.address=:80"

      # Configure HTTP to HTTPS Redirection
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"

      # HTTPS EntryPoint
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"

      # Attach dynamic TLS file
      # - "--providers.file.filename=/dynamic/tls.yaml"

      # Providers

      # Enable the Docker Swarm provider (instead of Docker provider)
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      
      # Watch for Swarm service changes (requires socket access)
      - "--providers.swarm.watch=true"

      # Recommended: Don't expose services by default; require explicit labels
      - "--providers.swarm.exposedbydefault=false"
      
      # Specify the default network for Traefik to connect to services
      - "--providers.swarm.network=lounastutka_traefik_proxy"

      # API & Dashboard
      - "--api.dashboard=true" # Enable the dashboard
      - "--api.insecure=false" # Explicitly disable insecure API mod

      # Observability
      - "--log.level=INFO" # Set the Log Level e.g INFO, DEBUG
      - "--accesslog=true" # Enable Access Logs
      - "--metrics.prometheus=true"  # Enable Prometheus

      # Certificates
      - "--certificatesresolvers.le.acme.email=tuukkanen.daniel@gmail.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.dnschallenge=true"
      - "--certificatesresolvers.le.acme.dnschallenge.provider=hetzner"
      - "--entrypoints.websecure.http.tls.certresolver=le"
    
    deploy:
      mode: replicated
      replicas: 1
      placement:

      # Placement constraints restrict where Traefik tasks can run.
      # Running on manager nodes is common for accessing the Swarm API via the socket.
        constraints:
          - node.role == manager

      # Traefik Dynamic configuration via labels
      # In Swarm, labels on the service definition configure Traefik routing for that service.
      labels:
        - "traefik.enable=true"

        # Dashboard router
        - "traefik.http.routers.dashboard.rule=Host(`dashboard.swarm.lounastutka.fi`)"
        - "traefik.http.routers.dashboard.entrypoints=websecure"
        - "traefik.http.routers.dashboard.service=api@internal"
        - "traefik.http.routers.dashboard.tls=true"

        # Basic‑auth middleware
        - "traefik.http.middlewares.dashboard-auth.basicauth.users=admin:$$apr1$$zcBUgvAR$$482EWeJ0xk2wquAJdYDNG/"
        - "traefik.http.routers.dashboard.middlewares=dashboard-auth@swarm"

        # Service hint
        - "traefik.http.services.traefik.loadbalancer.server.port=8080"

  # Deploy the Whoami application
  whoami:
    image: traefik/whoami
    networks:
      - traefik_proxy
    deploy:
      labels:
        # Enable Service discovery for Traefik
        - "traefik.enable=true"
        # Define the WHoami router rule
        - "traefik.http.routers.whoami.rule=Host(`whoami.swarm.lounastutka.fi`)"
        # Expose Whoami on the HTTPS entrypoint
        - "traefik.http.routers.whoami.entrypoints=websecure"
        # Enable TLS
        - "traefik.http.routers.whoami.tls=true"
        # Expose the whoami port number to Traefik
        - traefik.http.services.whoami.loadbalancer.server.port=80
  
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:${IMAGE_TAG:-latest}
    expose:
      - "3001"
    networks:
      - traefik_proxy
      - backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
      labels:
        # Enable Service discovery for Traefik
        - traefik.enable=true
        # Define the API router rule
        - traefik.http.routers.api.rule=PathPrefix(`/api`)
        # Expose the API on the HTTPS entrypoint
        - traefik.http.routers.api.entrypoints=websecure
        - traefik.http.routers.api.tls=true
        # Expose the API port number to Traefik
        - traefik.http.services.api.loadbalancer.server.port=3001

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:${IMAGE_TAG:-latest}
    networks:
      - traefik_proxy
    deploy:
      replicas: 1
      labels:
        # Enable Service discovery for Traefik
        - traefik.enable=true
        # Define the frontend router rule
        - traefik.http.routers.frontend.rule=PathPrefix(`/`)
        # Expose the frontend on the HTTPS entrypoint
        - traefik.http.routers.frontend.entrypoints=websecure
        - traefik.http.routers.frontend.tls=true
        # Expose the frontend port number to Traefik
        - traefik.http.services.frontend.loadbalancer.server.port=80

  # ---------------------------------------------
  # Database (PostgreSQL)
  # ---------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lounastutka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lounastutka}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------
  # Monitoring: Prometheus
  # ---------------------------------------------
  prometheus:
   image: prom/prometheus:latest
   volumes:
     - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
     - prom_data:/prometheus
   command:
     - '--config.file=/etc/prometheus/prometheus.yml'
     - '--storage.tsdb.path=/prometheus'
     - '--web.console.libraries=/usr/share/prometheus/console_libraries'
     - '--web.console.templates=/usr/share/prometheus/consoles'
   networks:
     - monitoring
     - backend # Needed to scrape the app
   deploy:
     replicas: 1
     placement:
       constraints:
         - node.role == manager

  # ---------------------------------------------
  # Logging: Loki
  # ---------------------------------------------
  loki:
    image: grafana/loki:latest
    ports:
      - target: 3100
        published: 3100
        protocol: tcp
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------
  # Visualization: Grafana
  # ---------------------------------------------
  grafana:
    image: grafana/grafana:latest
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

# ---------------------------------------------
# Named Volumes
# ---------------------------------------------
volumes:
  pg_data:
  prom_data:
  grafana_data:

# ---------------------------------------------
# Overlay Networks (Required for Swarm)
# ---------------------------------------------
networks:
  traefik_proxy:
    driver: overlay
    attachable: true
  edge:
    driver: overlay
  backend:
    driver: overlay
  monitoring:
    driver: overlay
