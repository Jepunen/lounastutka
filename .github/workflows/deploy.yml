name: Build & Deploy

on:
  push:
    branches: [main, docker-swarm]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ github.sha }}
      image_repo: ${{ steps.image_repo.outputs.repo }}

    steps:
      - uses: actions/checkout@v6

      - name: Normalize image repository
        id: image_repo
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build & push backend
        uses: docker/build-push-action@v7
        with:
          context: ./Backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_repo.outputs.repo }}/backend:latest
            ${{ env.REGISTRY }}/${{ steps.image_repo.outputs.repo }}/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./Frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_repo.outputs.repo }}/frontend:latest
            ${{ env.REGISTRY }}/${{ steps.image_repo.outputs.repo }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Deploy to Hetzner via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          port: 22
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: REGISTRY
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export IMAGE_TAG=${{ github.sha }}
            export GITHUB_REPOSITORY=${{ needs.build-and-push.outputs.image_repo }}
            export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            if [ -d /opt/lounastutka ]; then
              cd /opt/lounastutka && git pull
            else
              git clone https://github.com/${{ github.repository }}.git /opt/lounastutka
              cd /opt/lounastutka
            fi
            docker stack deploy -c compose.yaml lounastutka --with-registry-auth
