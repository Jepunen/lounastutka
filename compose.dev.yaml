services:
  backend:
    image: oven/bun:1
    working_dir: /app
    command: sh -lc "bun install && bun --watch index.ts"
    volumes:
      - ./Backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: oven/bun:1
    working_dir: /app
    command: sh -lc "bun install && bun run dev --host 0.0.0.0"
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lounastutka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lounastutka}
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lounastutka}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  backend_node_modules:
  frontend_node_modules:
  pg_data_dev:
